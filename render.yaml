services:
  - type: web
    name: btpay
    runtime: python
    buildCommand: pip install -r requirements.lock
    startCommand: gunicorn -c deploy/gunicorn.conf.py wsgi:app
    disk:
      name: btpay-data
      mountPath: /var/data/btpay
      sizeGB: 1
    envVars:
      - key: BTPAY_DATA_DIR
        value: /var/data/btpay
      - key: BTPAY_DEMO
        value: "0"
      - key: BTPAY_SECRET_KEY
        generateValue: true
      - key: BTPAY_JWT_ADMIN
        generateValue: true
      - key: BTPAY_JWT_LOGIN
        generateValue: true
      - key: BTPAY_JWT_API
        generateValue: true
      - key: BTPAY_JWT_INVITE
        generateValue: true
      - key: BTPAY_REFNUM_KEY
        generateValue: true
      - key: BTPAY_REFNUM_NONCE
        generateValue: true
      - key: BTPAY_BIND
        value: "0.0.0.0:10000"
      - key: PYTHON_VERSION
        value: "3.13.0"
