<!-- Mobile sidebar overlay -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-30 lg:hidden" aria-hidden="true"></div>

<!-- Sidebar: slides in on mobile, always visible on lg+ -->
<aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full transition-transform duration-200 ease-in-out lg:relative lg:translate-x-0 lg:flex lg:flex-col">
    <div class="flex items-center justify-between h-16 px-6 border-b border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('dashboard.index') }}" class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='images/btpay-icon.svg') }}" alt="BTPay" class="h-8 w-8">
            <span class="text-xl font-bold text-brand">{{ current_org.name|default('BTPay') }}</span>
        </a>
        <!-- Close button (mobile only) -->
        <button onclick="BTPay.toggleSidebar()" class="lg:hidden p-1 rounded text-gray-400 hover:text-gray-600 dark:hover:text-gray-300">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
    </div>
    <nav class="flex-1 px-4 py-4 space-y-1">
        {% set active = request.endpoint or '' %}
        <a href="{{ url_for('dashboard.index') }}"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'dashboard' in active %}bg-brand/10 text-brand{% else %}text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
            Dashboard
        </a>
        <a href="{{ url_for('invoices.list_invoices') }}"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'invoices' in active %}bg-brand/10 text-brand{% else %}text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
            Invoices
        </a>
        <a href="{{ url_for('storefronts.list_storefronts') }}"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'storefront' in active %}bg-brand/10 text-brand{% else %}text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            Storefronts
        </a>
        <a href="{{ url_for('settings.general') }}"
           class="flex items-center px-3 py-2 rounded-lg text-sm font-medium
                  {% if 'settings' in active %}bg-brand/10 text-brand{% else %}text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-700{% endif %}">
            <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
            Settings
        </a>
    </nav>
    <div class="px-4 py-4 border-t border-gray-200 dark:border-gray-700">
        <p class="text-xs text-gray-500 dark:text-gray-400">BTPay v0.1</p>
    </div>
</aside>
