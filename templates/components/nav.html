<header class="h-16 flex items-center justify-between px-4 sm:px-6 bg-white dark:bg-gray-800 border-b border-gray-200 dark:border-gray-700">
    <div class="flex items-center lg:hidden">
        <!-- Hamburger menu button -->
        <button id="mobile-menu-btn" class="p-2 -ml-1 mr-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700" aria-label="Open menu">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
        </button>
        <a href="{{ url_for('dashboard.index') }}" class="flex items-center space-x-2">
            <img src="{{ url_for('static', filename='images/btpay-icon.svg') }}" alt="BTPay" class="h-7 w-7">
            <span class="text-lg font-bold text-brand">{{ current_org.name|default('BTPay') }}</span>
        </a>
    </div>

    <div class="hidden lg:block">
        <h1 class="text-lg font-semibold">{% block page_title %}{% endblock %}</h1>
    </div>

    <div class="flex items-center space-x-2 sm:space-x-4">
        <!-- Theme toggle -->
        <button onclick="BTPay.toggleTheme()" class="p-2 rounded-lg text-gray-500 hover:bg-gray-100 dark:hover:bg-gray-700" title="Toggle theme">
            <svg class="w-5 h-5 dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
            <svg class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        </button>

        <!-- User menu -->
        {% if current_user %}
        <div class="flex items-center space-x-2 sm:space-x-3">
            <span class="text-sm text-gray-600 dark:text-gray-400 hidden sm:inline">{{ current_user.email }}</span>
            <form method="POST" action="{{ url_for('auth.logout') }}" class="inline">
                <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">
                <button type="submit" class="text-sm text-red-600 hover:text-red-800 dark:text-red-400">Logout</button>
            </form>
        </div>
        {% endif %}
    </div>
</header>
