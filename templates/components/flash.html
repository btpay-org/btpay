{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<div class="space-y-2 mb-4">
    {% for category, message in messages %}
    <div class="flash-message flex items-center p-4 rounded-lg
                {% if category == 'error' %}bg-red-50 text-red-800 dark:bg-red-900/30 dark:text-red-300
                {% elif category == 'success' %}bg-green-50 text-green-800 dark:bg-green-900/30 dark:text-green-300
                {% elif category == 'warning' %}bg-yellow-50 text-yellow-800 dark:bg-yellow-900/30 dark:text-yellow-300
                {% else %}bg-blue-50 text-blue-800 dark:bg-blue-900/30 dark:text-blue-300{% endif %}">
        <span class="flex-1 text-sm">{{ message }}</span>
        <button onclick="this.parentElement.remove()" class="ml-4 text-current opacity-50 hover:opacity-100">&times;</button>
    </div>
    {% endfor %}
</div>
{% endif %}
{% endwith %}
