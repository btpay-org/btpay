{% extends 'setup/base.html' %}
{% block wizard_content %}
<form method="POST" class="space-y-6">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

    <div>
        <h3 class="text-lg font-semibold mb-1">Stablecoins</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">Accept USDC, USDT, or DAI on EVM-compatible chains.</p>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Chain</label>
        <select name="chain"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            {% for c in chains %}
            <option value="{{ c }}" {% if form.get('chain') == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Token</label>
        <select name="token"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            {% for t in tokens %}
            <option value="{{ t }}" {% if form.get('token') == t %}selected{% endif %}>{{ t }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Receiving Address</label>
        <input type="text" name="address" value="{{ form.get('address', '') }}"
               placeholder="0x..."
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent font-mono text-sm">
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Label (optional)</label>
        <input type="text" name="label" value="{{ form.get('label', '') }}"
               placeholder="e.g. Treasury wallet"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('setup.choose_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">&larr; Back</a>
        <div class="flex items-center gap-4">
            <a href="{{ url_for('setup.skip_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">Skip</a>
            <button type="submit" class="px-6 py-2 bg-brand text-white rounded-lg hover:opacity-90 text-sm font-medium">
                Save & Continue
            </button>
        </div>
    </div>
</form>
{% endblock %}
