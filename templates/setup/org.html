{% extends 'setup/base.html' %}
{% block wizard_content %}
<form method="POST" class="space-y-6">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

    <div>
        <h3 class="text-lg font-semibold mb-1">Organization Details</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">Tell us about your business. You can change these later in Settings.</p>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Organization Name</label>
        <input type="text" name="name" value="{{ org.name }}"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent"
               placeholder="My Business">
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Default Currency</label>
        <select name="default_currency"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            {% for c in ['USD', 'EUR', 'GBP', 'CAD', 'AUD', 'CHF', 'JPY', 'BRL', 'MXN'] %}
            <option value="{{ c }}" {% if org.default_currency == c %}selected{% endif %}>{{ c }}</option>
            {% endfor %}
        </select>
        <p class="text-xs text-gray-500 mt-1">Currency shown on invoices and the dashboard</p>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Timezone</label>
        <select name="timezone" id="tz-select"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            {% for tz in ['UTC', 'US/Eastern', 'US/Central', 'US/Mountain', 'US/Pacific', 'Europe/London', 'Europe/Berlin', 'Europe/Paris', 'Asia/Tokyo', 'Asia/Shanghai', 'America/Sao_Paulo', 'Australia/Sydney'] %}
            <option value="{{ tz }}" {% if org.timezone == tz %}selected{% endif %}>{{ tz }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('setup.skip_org') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">Skip</a>
        <button type="submit" class="px-6 py-2 bg-brand text-white rounded-lg hover:opacity-90 text-sm font-medium">
            Continue
        </button>
    </div>
</form>

<script>
(function() {
    try {
        var tz = Intl.DateTimeFormat().resolvedOptions().timeZone;
        var sel = document.getElementById('tz-select');
        for (var i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value === tz) { sel.selectedIndex = i; break; }
        }
    } catch(e) {}
})();
</script>
{% endblock %}
