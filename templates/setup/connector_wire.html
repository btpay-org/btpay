{% extends 'setup/base.html' %}
{% block wizard_content %}
<form method="POST" class="space-y-6">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

    <div>
        <h3 class="text-lg font-semibold mb-1">Wire Transfer</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">Add your bank details so customers can pay via wire transfer.</p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-1">Display Name</label>
            <input type="text" name="name" value="{{ form.get('name', 'Wire Transfer') }}"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Currency</label>
            <select name="currency"
                    class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                {% for c in ['USD', 'EUR', 'GBP', 'CAD', 'AUD', 'CHF'] %}
                <option value="{{ c }}" {% if form.get('currency', 'USD') == c %}selected{% endif %}>{{ c }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Bank Name</label>
        <input type="text" name="bank_name" value="{{ form.get('bank_name', '') }}"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Account Holder Name</label>
        <input type="text" name="account_name" value="{{ form.get('account_name', '') }}"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-1">Account Number</label>
            <input type="text" name="account_number" value="{{ form.get('account_number', '') }}"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Routing Number</label>
            <input type="text" name="routing_number" value="{{ form.get('routing_number', '') }}"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="block text-sm font-medium mb-1">IBAN</label>
            <input type="text" name="iban" value="{{ form.get('iban', '') }}"
                   placeholder="Optional"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">SWIFT / BIC</label>
            <input type="text" name="swift_code" value="{{ form.get('swift_code', '') }}"
                   placeholder="Optional"
                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
        </div>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('setup.choose_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">&larr; Back</a>
        <div class="flex items-center gap-4">
            <a href="{{ url_for('setup.skip_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">Skip</a>
            <button type="submit" class="px-6 py-2 bg-brand text-white rounded-lg hover:opacity-90 text-sm font-medium">
                Save & Continue
            </button>
        </div>
    </div>
</form>
{% endblock %}
