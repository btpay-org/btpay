{% extends 'setup/base.html' %}
{% block wizard_content %}
<form method="POST" class="space-y-6">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

    <div>
        <h3 class="text-lg font-semibold mb-1">Bitcoin Wallet</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">Add an xpub, output descriptor, or a list of addresses to receive on-chain payments.</p>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Wallet Name</label>
        <input type="text" name="name" value="{{ form.get('name', '') }}"
               placeholder="My Wallet"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent">
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Wallet Type</label>
        <select name="wallet_type" id="wallet-type" onchange="toggleWalletFields()"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            <option value="xpub" {% if form.get('wallet_type') == 'xpub' %}selected{% endif %}>Extended Public Key (xpub/ypub/zpub)</option>
            <option value="descriptor" {% if form.get('wallet_type') == 'descriptor' %}selected{% endif %}>Output Descriptor</option>
            <option value="address_list" {% if form.get('wallet_type') == 'address_list' %}selected{% endif %}>Address List</option>
        </select>
    </div>

    <div id="xpub-field">
        <label class="block text-sm font-medium mb-1">Extended Public Key</label>
        <input type="text" name="xpub" value="{{ form.get('xpub', '') }}"
               placeholder="xpub6..."
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent font-mono text-sm">
        <p class="text-xs text-gray-500 mt-1">From your hardware or software wallet (xpub, ypub, or zpub)</p>
    </div>

    <div id="descriptor-field" class="hidden">
        <label class="block text-sm font-medium mb-1">Output Descriptor</label>
        <input type="text" name="descriptor" value="{{ form.get('descriptor', '') }}"
               placeholder="wpkh([fingerprint/path]xpub.../0/*)"
               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent font-mono text-sm">
    </div>

    <div id="addresses-field" class="hidden">
        <label class="block text-sm font-medium mb-1">Addresses (one per line)</label>
        <textarea name="addresses" rows="5"
                  placeholder="bc1q...&#10;bc1q...&#10;bc1q..."
                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 focus:ring-2 focus:ring-brand focus:border-transparent font-mono text-sm">{{ form.get('addresses', '') }}</textarea>
    </div>

    <div>
        <label class="block text-sm font-medium mb-1">Network</label>
        <select name="network"
                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
            <option value="mainnet" {% if form.get('network', 'mainnet') == 'mainnet' %}selected{% endif %}>Mainnet</option>
            <option value="testnet" {% if form.get('network') == 'testnet' %}selected{% endif %}>Testnet</option>
        </select>
    </div>

    <div class="flex items-center justify-between pt-4 border-t border-gray-200 dark:border-gray-700">
        <a href="{{ url_for('setup.choose_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">&larr; Back</a>
        <div class="flex items-center gap-4">
            <a href="{{ url_for('setup.skip_connector') }}" class="text-sm text-gray-500 hover:text-gray-700 dark:text-gray-400 dark:hover:text-gray-200">Skip</a>
            <button type="submit" class="px-6 py-2 bg-brand text-white rounded-lg hover:opacity-90 text-sm font-medium">
                Save & Continue
            </button>
        </div>
    </div>
</form>

<script>
function toggleWalletFields() {
    var t = document.getElementById('wallet-type').value;
    document.getElementById('xpub-field').classList.toggle('hidden', t !== 'xpub');
    document.getElementById('descriptor-field').classList.toggle('hidden', t !== 'descriptor');
    document.getElementById('addresses-field').classList.toggle('hidden', t !== 'address_list');
}
toggleWalletFields();
</script>
{% endblock %}
