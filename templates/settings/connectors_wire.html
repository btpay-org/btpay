{% extends 'base.html' %}
{% block title %}Wire Transfer — BTPay{% endblock %}
{% block content %}
<div class="max-w-4xl mx-auto">
    <h2 class="text-2xl font-bold mb-6">Settings</h2>

    <div class="flex flex-col lg:flex-row gap-6">
        {% include 'settings/_nav.html' %}

        <div class="flex-1">
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm p-6">
                <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase mb-4">Wire Transfer Details</h3>
                <p class="text-sm text-gray-500 mb-6">These banking details will be displayed to payers who select wire transfer at checkout.</p>

                <form method="POST" class="space-y-4">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token }}">

                    <div class="flex items-center space-x-3 mb-4">
                        <label class="text-sm font-medium">Enabled</label>
                        <input type="hidden" name="is_active" value="0">
                        <input type="checkbox" name="is_active" value="1"
                               {% if wc and wc.is_active %}checked{% elif not wc %}checked{% endif %}
                               class="w-4 h-4 rounded border-gray-300 text-brand focus:ring-brand">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Display Name</label>
                        <input type="text" name="name" value="{{ wc.name if wc else 'Wire Transfer' }}" placeholder="Wire Transfer"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Bank Name <span class="text-red-500">*</span></label>
                            <input type="text" name="bank_name" value="{{ wc.bank_name if wc else '' }}" placeholder="First National Bank"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Beneficiary Name <span class="text-red-500">*</span></label>
                            <input type="text" name="account_name" value="{{ wc.account_name if wc else '' }}" placeholder="Acme Corp"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Account Number</label>
                            <input type="text" name="account_number" value="{{ wc.account_number if wc else '' }}" placeholder="****4567"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 font-mono">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Routing Number</label>
                            <input type="text" name="routing_number" value="{{ wc.routing_number if wc else '' }}" placeholder="021000021"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 font-mono">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">SWIFT/BIC</label>
                            <input type="text" name="swift_code" value="{{ wc.swift_code if wc else '' }}" placeholder="FNBOUS33"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 font-mono">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">IBAN</label>
                            <input type="text" name="iban" value="{{ wc.iban if wc else '' }}" placeholder="DE89 3704 0044 0532 0130 00"
                                   class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 font-mono">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Bank Address</label>
                        <input type="text" name="bank_address" value="{{ wc.bank_address if wc else '' }}" placeholder="123 Main St, New York, NY 10001"
                               class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Currency</label>
                        <select name="currency"
                                class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700">
                            {% for cur in ['USD', 'EUR', 'GBP', 'CAD', 'AUD', 'CHF', 'JPY'] %}
                            <option value="{{ cur }}" {% if wc and wc.currency == cur %}selected{% elif not wc and cur == 'USD' %}selected{% endif %}>{{ cur }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1">Notes to Payer</label>
                        <textarea name="notes" rows="2" placeholder="Please include the invoice number in the wire memo."
                                  class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-sm">{{ wc.notes if wc else '' }}</textarea>
                    </div>

                    <button type="submit" class="px-6 py-2 bg-brand text-white rounded-lg hover:opacity-90 text-sm font-medium">
                        Save Wire Transfer Settings
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
